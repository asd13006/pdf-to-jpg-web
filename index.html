<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 專業轉換工具 Web 版 (本地運算)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .glass-card { background: rgba(44, 44, 46, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gradient { background: linear-gradient(135deg, #0A84FF 0%, #0056b3 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(10, 132, 255, 0.3); }
        .btn-gradient:disabled { background: #333; transform: none; box-shadow: none; cursor: not-allowed; color: #888; }
        .breathing { animation: breathe 2s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        /* 拖曳時的高亮特效 */
        .drag-over { border-color: #0A84FF !important; background-color: rgba(10, 132, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-lg rounded-2xl p-8 shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 text-center">PDF 轉圖片神器 <span class="text-xs bg-blue-600 px-2 py-1 rounded text-white ml-2">批次本地版</span></h1>
        
        <form id="uploadForm" class="space-y-6">
            <div id="dropZone" class="relative border-2 border-dashed border-gray-600 rounded-xl p-8 text-center transition-all cursor-pointer" onclick="document.getElementById('fileInput').click()">
                <div class="text-4xl mb-3" id="dropIcon">☁️</div>
                <p id="fileNameDisplay" class="text-gray-400 font-medium">點擊或拖曳多個 PDF 檔案至此</p>
                <input type="file" id="fileInput" accept=".pdf" class="hidden" multiple onchange="updateFileName()">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">影像畫質</label>
                    <select id="qualitySelect" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white outline-none focus:border-blue-500 transition-colors">
                        <option value="1.0">1.0x (標準)</option>
                        <option value="2.0" selected>2.0x (高畫質)</option>
                        <option value="3.0">3.0x (超高清)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">輸出格式</label>
                    <select id="formatSelect" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white outline-none focus:border-blue-500 transition-colors">
                        <option value="image/jpeg" selected>JPG</option>
                        <option value="image/png">PNG (支援透明)</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-gradient w-full py-4 rounded-xl font-bold text-lg mt-4 flex justify-center items-center gap-2">
                🚀 開始批次轉換並下載 Zip
            </button>
        </form>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const dropIcon = document.getElementById('dropIcon');

        // === 拖曳功能 (Drag and Drop) 邏輯 ===
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.add('drag-over');
                dropIcon.innerHTML = '📥';
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.remove('drag-over');
                dropIcon.innerHTML = '☁️';
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            
            // 驗證是否只有 PDF
            const validFiles = Array.from(files).filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
            
            if (validFiles.length > 0) {
                // 將拖曳的檔案放入 input
                const dataTransfer = new DataTransfer();
                validFiles.forEach(file => dataTransfer.items.add(file));
                fileInput.files = dataTransfer.files;
                updateFileName();
            } else {
                alert("請只拖曳 PDF 檔案！");
            }
        });

        // 顯示選擇嘅檔案名 (支援多檔顯示)
        function updateFileName() {
            const files = fileInput.files;
            if (files.length === 1) {
                fileNameDisplay.innerHTML = `<span class="text-white">📄 ${files[0].name}</span>`;
            } else if (files.length > 1) {
                // 顯示選擇咗幾多個檔案
                fileNameDisplay.innerHTML = `<span class="text-blue-400 font-bold">📚 已選擇 ${files.length} 個 PDF 檔案</span>`;
            } else {
                fileNameDisplay.innerHTML = `點擊或拖曳多個 PDF 檔案至此`;
            }
        }

        function canvasToBlobAsync(canvas, mimeType, qualityParam) {
            return new Promise(resolve => canvas.toBlob(resolve, mimeType, qualityParam));
        }

        // 處理表單提交 (批次轉換邏輯)
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const files = fileInput.files;
            if (files.length === 0) {
                alert("請先加入 PDF 檔案！");
                return;
            }

            const scale = parseFloat(document.getElementById('qualitySelect').value);
            const mimeType = document.getElementById('formatSelect').value;
            const ext = mimeType === 'image/jpeg' ? 'jpg' : 'png';

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.classList.add('breathing');

            try {
                const zip = new JSZip();

                // 迴圈處理每一個 PDF 檔案
                for (let f = 0; f < files.length; f++) {
                    const file = files[f];
                    const baseFilename = file.name.replace(/\.[^/.]+$/, "");
                    
                    btn.innerHTML = `⏳ 讀取中: ${file.name.substring(0, 15)}...`;
                    
                    const arrayBuffer = await new Promise((resolve, reject) => {
                        const fileReader = new FileReader();
                        fileReader.onload = () => resolve(fileReader.result);
                        fileReader.onerror = reject;
                        fileReader.readAsArrayBuffer(file);
                    });

                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const totalPages = pdf.numPages;
                    
                    // 如果多過 1 個檔案，為每個檔案開一個獨立資料夾
                    let folder = zip;
                    if (files.length > 1) {
                        folder = zip.folder(baseFilename);
                    }

                    // 逐頁渲染
                    for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                        // 更新按鈕進度顯示 (檔案進度 + 頁數進度)
                        btn.innerHTML = `⟳ 檔案 ${f+1}/${files.length} (第 ${pageNum}/${totalPages} 頁)`;
                        
                        const page = await pdf.getPage(pageNum);
                        const viewport = page.getViewport({ scale: scale });
                        
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        if (mimeType === 'image/jpeg') {
                            ctx.fillStyle = "#FFFFFF";
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                        }

                        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                        
                        const qualityParam = mimeType === 'image/jpeg' ? 0.95 : undefined;
                        const blob = await canvasToBlobAsync(canvas, mimeType, qualityParam);
                        
                        // 寫入 Zip 檔案 (如有資料夾則放入資料夾)
                        folder.file(`${baseFilename}_page_${pageNum}.${ext}`, blob);
                    }
                }

                // 所有檔案處理完畢，生成 Zip
                btn.innerHTML = '📦 正在將所有檔案打包成 Zip...';
                const zipContent = await zip.generateAsync({ type: "blob" });
                
                // 下載 Zip
                const downloadUrl = URL.createObjectURL(zipContent);
                const a = document.createElement('a');
                a.href = downloadUrl;
                // 如果得 1 個檔，用佢個名；如果多過 1 個檔，叫 Batch_Converted
                a.download = files.length === 1 ? `${files[0].name.replace(/\.[^/.]+$/, "")}_converted.zip` : `Batch_Converted_${files.length}_Files.zip`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(downloadUrl);

                btn.innerHTML = '✅ 全部轉換成功！(已下載)';

            } catch (error) {
                console.error(error);
                btn.innerHTML = '❌ 轉換發生錯誤，請檢查檔案';
            } finally {
                btn.classList.remove('breathing');
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '🚀 開始批次轉換並下載 Zip';
                }, 3000);
            }
        };
    </script>
</body>
</html>
